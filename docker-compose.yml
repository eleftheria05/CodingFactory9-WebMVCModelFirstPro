services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest # Έτοιμο image από τη Microsoft για SQL Server 2022
    container_name: schoolmvc9-db                     # Σταθερό όνομα του container για ευκολότερη αναφορά
    environment:
      ACCEPT_EULA: "Y"                                # αποδοχή license
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"             # password από το .env
    ports:
      - "${DB_PORT:-1436}:1433"                       # port mapping - host port από .env ή default 1436, container port 1433 (default SQL Server port)
    volumes:
      - sqlserver-data:/var/opt/mssql                 # 
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    build: .
    container_name: schoolmvc9-app
    ports:
      - "${APP_PORT:-8081}:8080"              #port mapping - host port από .env ή default 8081, container port 8080 (όπως ορίζεται στο appsettings.json)
    environment:
       ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
       ConnectionStrings__DevConnection: "Server=${DB_HOST};Database=${DB_NAME};User=${DB_USER};Password=${DB_USER_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True"
    volumes:
      - dataprotection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
       sqlserver:
         condition: service_healthy

volumes:
  sqlserver-data:
  dataprotection-keys: